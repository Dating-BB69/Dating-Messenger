<style>
body { margin:0; font-family: Arial,sans-serif; background:#f0f2f5; }
/* Header */
.header { display:flex; justify-content:space-between; align-items:center; padding:5px 15px; background:#1877f2; color:white; position:sticky; top:0; z-index:1000; }
.header-left{display:flex;align-items:center;gap:10px;}
.header-left img{height:40px;}
.search-box{display:flex;align-items:center;background:white;border-radius:20px;padding:5px 10px;color:gray;}
.search-box input{border:none;outline:none;padding:5px;width:150px;}
.search-box i{margin-right:5px;}
.header-middle{display:flex;justify-content:center;align-items:center;gap:20px;}
.icon-btn{width:50px;height:50px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;color:white;font-size:20px;transition:background 0.3s;}
.icon-btn:hover{background:rgba(255,255,255,0.2);}
.header-right{display:flex;align-items:center;gap:10px;}
/* Sidebar */
.sidebar {
    width: 450px;
    background: white;
    padding: 10px;
    position: fixed;
    top: 60px;
    left: 0;
    bottom: 0;
    overflow-y: auto;
}

.sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    cursor: pointer;
    border-radius: 5px;
}

.sidebar-item:hover {
    background: #f0f2f5;
}

.sidebar-item img {
    width: 30px;
    height: 30px;
}
/* Main Content: Centralized & smaller width */
.main-content {
    margin-left: 480px;        /* sidebar অনুযায়ী */
    margin-right: 260px;        /* ডান দিকে auto */
    padding: 10px;
    max-width: 600px;          /* পোস্টের প্রস্থ কমানো */
}

/* Post Container */
.post-container {
    background: white;
    margin-bottom: 20px;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    width: 100%;               /* main-content অনুযায়ী */
}

/* Post Header */
.post-header {
    display: flex;
    align-items: center;
    gap: 10px;
}

.profile-pic {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.user-info {
    display: flex;
    flex-direction: column;
}

.user-name-time {
    display: flex;
    align-items: center;
    gap: 10px;
}

.follow-button {
    border: 1px solid #1877f2;
    color: #1877f2;
    background: white;
    padding: 3px 10px;
    border-radius: 5px;
    cursor: pointer;
}

.follow-button:hover {
    background: #e7f3ff;
}

/* Post Text */
.post-text {
    margin: 10px 0;
}

/* Post Images & Videos: Responsive */
.post-image-link img,
.post-image-link video {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
    object-fit: contain;
    max-height: 70vh;
}

/* Reactions */
.reactions {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 14px;
}

.reaction-options a {
    margin-right: 10px;
    color: black;
    text-decoration: none;
}

/* Post Footer */
.post-footer {
    display: flex;
    justify-content: space-around;
    margin-top: 10px;
    border-top: 1px solid #ccc;
    padding-top: 5px;
}

.post-footer a{text-decoration:none;color:black;}
.load-more{display:flex;justify-content:center;margin:20px 0;}
.load-more button{background:#1877f2;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;}
.like-btn{cursor:pointer;background:none;border:none;color:black;font-weight:normal;}
.like-btn.liked{font-weight:bold;color:blue;}
}

/* Load More Button */
.load-more {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

.load-more button {
    background: #1877f2;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
}/* Responsive */
@media(max-width:768px){.sidebar{display:none;}.main-content{margin-left:0;padding:10px;}.header-middle{gap:10px;}}
</style>

];

const siteRedirect = "https://www.google.com"; // এখানে তোমার সাইট লিংক বসাও
let currentIndex = 0;
const initialLoad = 15;
const loadCount = 5;
let redirectDone = false;

// পোস্ট রেন্ডার ফাংশন
function renderPost(p){
    const postHTML = document.createElement('div');
    postHTML.classList.add('post-container');
    postHTML.innerHTML = `
        <div class="post-header">
            <img class="profile-pic" src="${p.profile}" alt="Profile">
            <div class="user-info">
                <div class="user-name-time">
                    <p class="username" style="cursor:pointer;color:blue;">${p.name}</p>
                    <button class="follow-button">Follow</button>
                </div>
            </div>
        </div>
        <p class="post-text">${p.text}</p>
        <a class="post-image-link" href="${p.links.content}" target="_blank">
            <img src="${p.image}" alt="Post Image">
        </a>
        <div class="reactions">
            <div class="reaction-countlove"><span class="like-display" style="color:black;cursor:pointer;">${p.likes}</span></div>
            <div class="reaction-options"><a href="${p.links.comment}" target="_blank">${p.comments} Comment</a></div>
            <span class="user-name">${p.views} views</span>
        </div>
        <div class="post-footer">
            <button class="like-btn">Like</button>
            <div><a href="${p.links.comment}" target="_blank"><i class="fa-regular fa-comment"></i> Comment</a></div>
            <div><a href="https://www.facebook.com/sharer/sharer.php?u=${p.links.content}" target="_blank"><i class="fa fa-share"></i> Share</a></div>
        </div>
    `;

    // username ক্লিক → প্রোফাইল
    postHTML.querySelector('.username').addEventListener('click',()=>{window.location.href=p.links.profile;});

    // follow button
    const followBtn = postHTML.querySelector('.follow-button');
    followBtn.addEventListener('click',()=>{followBtn.textContent = followBtn.textContent==="Follow"?"Followed":"Follow";});

    // like button
    const likeBtn = postHTML.querySelector('.like-btn');
    const likeDisplay = postHTML.querySelector('.like-display');
    let liked=false;
    likeBtn.addEventListener('click',()=>{
        if(!liked){liked=true; likeBtn.textContent="Liked"; likeBtn.classList.add('liked'); likeDisplay.textContent=parseInt(likeDisplay.textContent)+1;}
        else{liked=false; likeBtn.textContent="Like"; likeBtn.classList.remove('liked'); likeDisplay.textContent=parseInt(likeDisplay.textContent)-1;}
    });

    // image click → content
    postHTML.querySelector('.post-image-link').addEventListener('click',(e)=>{e.preventDefault();window.location.href=p.links.content;});

    document.getElementById('postContainer').appendChild(postHTML);
}

// প্রথমে ১০টি পোস্ট লোড
for(let i=0;i<initialLoad && i<posts.length;i++){
    renderPost(posts[i]);
    currentIndex++;
}

// See More ক্লিক ইভেন্ট
document.getElementById('seeMoreBtn').addEventListener('click', ()=>{
    if(!redirectDone){
        // প্রথম ক্লিকে redirect
        window.location.href = siteRedirect;
        redirectDone = true;
    } else {
        // পরের ক্লিকে ৫টি পোস্ট লোড
        for(let i=currentIndex;i<currentIndex+loadCount && i<posts.length;i++){
            renderPost(posts[i]);
            currentIndex++;
        }
        // সব পোস্ট শেষ হলে See More লুকানো
        if(currentIndex>=posts.length){
            document.getElementById('seeMoreBtn').style.display='none';
        }
    }
});
</script>
