<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Facebook Feed Pro V10</title>
<style>
:root{--fb:#1877F2;--bg:#f0f2f5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg)}
a{text-decoration:none}
header{position:sticky;top:0;background:#fff;padding:10px;display:grid;grid-template-columns:260px 1fr 220px;box-shadow:0 1px 4px rgba(0,0,0,.12);z-index:999}
.left,.center,.right{display:flex;align-items:center}.left{gap:10px}.center{justify-content:center;gap:10px}.right{justify-content:flex-end;gap:10px}
.logo{font-size:42px;color:#1877F2;font-weight:bold}
.search{padding:10px;border:none;border-radius:999px;background:#eef2f5;width:180px}
.icon,.item,.actions button{transition:.25s}
.icon{padding:8px;border-radius:8px;color:#444}
.icon:hover,.item:hover{background:#eef2f5}
.dropdown{position:relative}.menu{display:none;position:absolute;top:100%;left:0;background:#fff;min-width:220px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.dropdown:hover .menu{display:block}.menu a,.item{display:block;padding:12px;color:#111}
.layout{max-width:1200px;margin:auto;display:grid;grid-template-columns:250px 700px;gap:20px;padding:20px;justify-content:center}
.sidebar,.post{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.sidebar{padding:16px}.feed{display:flex;flex-direction:column;gap:16px}
.post{padding:16px}.top{display:flex;justify-content:space-between;align-items:center}
.user{display:flex;gap:10px;align-items:center}
.avatar{width:50px;height:50px;border-radius:50%}
.profile-name{color:#050505!important;text-decoration:none!important;font-weight:600}
.post-text{margin:10px 0;color:#050505}
.post-link{color:#1877F2!important;font-weight:600}
.media{width:100%;border-radius:12px;margin-top:10px}
.follow{background:var(--fb);color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
.follow.active{background:#42b72a}
.stats{display:flex;justify-content:space-between;padding:10px 0;color:#666}
.actions{display:flex;gap:10px}
.actions button{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer}
.likeBtn.active{background:#1877F2;color:#fff}
.commentBtn:hover{background:#eee}.shareBtn:hover{background:#42b72a;color:#fff}
.load{text-align:center;padding:20px}
#loadMore{background:#1877F2;color:#fff;border:none;padding:12px 20px;border-radius:10px;cursor:pointer}
@media(max-width:768px){header{grid-template-columns:1fr}.layout{grid-template-columns:1fr}.sidebar{display:none}.center,.right{justify-content:center;flex-wrap:wrap}}
</style>
</head>
<body>
<header>
<div class="left"><div class="logo">f</div><input id="search" class="search" placeholder="Search profile"></div>
<div class="center">
<div class="dropdown"><a class="icon" href="#">🏠</a><div class="menu"><a href="https://example.com">Home</a></div></div>
<div class="dropdown"><a class="icon" href="#">📊</a><div class="menu"><a href="https://example.com">Dashboard</a></div></div>
<div class="dropdown"><a class="icon" href="#">📢</a><div class="menu"><a href="https://example.com">Ad Center</a></div></div>
<div class="dropdown"><a class="icon" href="#">👥</a><div class="menu"><a href="https://example.com">Groups</a></div></div>
<div class="dropdown"><a class="icon" href="#">🎬</a><div class="menu"><a href="https://example.com">Reels</a></div></div>
</div>
<div class="right"><a class="icon" href="https://example.com">☰</a><a class="icon" href="https://example.com">💬</a><a class="icon" href="https://example.com">🔔</a><a class="icon" href="https://example.com">👤</a></div>
</header>

<div class="layout">
<aside class="sidebar">
<a class="item" href="https://x.com">👤 My Page</a>
<a class="item" href="https://example.com">📊 Professional Dashboard</a>
<a class="item" href="https://example.com">📢 Ad Center</a>
<a class="item" href="https://example.com">👥 Groups</a>
<a class="item" href="https://example.com">🎬 Reels</a>
<a class="item" href="https://example.com">🕒 Memories</a>
<a class="item" href="https://example.com">🛡️ Safety</a>
<a class="item" href="https://x.com">➕ See More</a>
</aside>
<section id="feed" class="feed"></section>
</div>

<div class="load"><button id="loadMore">Load More</button></div>

<script>
const posts=[
{name:"Profile One",profileImage:"https://picsum.photos/60?1",profileUrl:"https://x.com",postImage:"https://picsum.photos/700/420?1",postUrl:"https://x.com",postText:"This is the first sample post.",postLinkText:"https://x.com",commentLink:"https://x.com",likes:897.76,comments:"697.84k",shares:"321.25k"},

{name:"Profile Two",profileImage:"https://picsum.photos/60?2",profileUrl:"https://example.com/profile2",postImage:"https://picsum.photos/700/420?2",postUrl:"https://example.com/post2",postText:"This is the second sample post.",postLinkText:"Download Now",commentLink:"https://example.com/comment2",likes:743.55,comments:"582.31k",shares:"211.44k"},

{name:"Profile Three",profileImage:"https://picsum.photos/60?3",profileUrl:"https://example.com/profile3",postImage:"https://picsum.photos/700/420?3",postUrl:"https://example.com/post3",postText:"This is the third sample post.",postLinkText:"Read More",commentLink:"https://example.com/comment3",likes:921.63,comments:"804.11k",shares:"447.93k"}
];
const feed=document.getElementById('feed');let loaded=0;
function render(n){
posts.slice(loaded,loaded+n).forEach(post=>{
const el=document.createElement('article');
el.className='post';el.dataset.name=post.name.toLowerCase();
el.innerHTML=`<div class="top"><div class="user"><a href="${post.profileUrl}" target="_blank"><img class="avatar" src="${post.profileImage}"></a><a class="profile-name" href="${post.profileUrl}" target="_blank">${post.name}</a></div><button class="follow">Follow</button></div>
<p class="post-text">${post.postText}</p>
<a class="post-link" href="${post.postUrl}" target="_blank">${post.postLinkText}</a>
<a href="${post.postUrl}" target="_blank"><img class="media" src="${post.postImage}" loading="lazy"></a>
<div class="stats"><span class="likes">👍 ${post.likes.toFixed(2)}k</span><span>💬 ${post.comments}</span><span>↗ ${post.shares}</span></div>
<div class="actions"><button class="likeBtn">👍 Like</button><button class="commentBtn">💬 Comment</button><button class="shareBtn">↗ Share</button></div>`;
let liked=false;
el.querySelector('.likeBtn').onclick=function(){liked=!liked;this.classList.toggle('active');this.textContent=liked?'👍 Liked':'👍 Like';post.likes+=liked?1:-1;el.querySelector('.likes').textContent='👍 '+post.likes.toFixed(2)+'k';};
el.querySelector('.follow').onclick=function(){this.classList.toggle('active');this.textContent=this.classList.contains('active')?'Followed':'Follow';};
el.querySelector('.commentBtn').onclick=()=>window.open(post.commentLink,'_blank');
el.querySelector('.shareBtn').onclick=()=>window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(post.postUrl),'_blank');
feed.appendChild(el);
});
loaded+=n;if(loaded>=posts.length)document.getElementById('loadMore').style.display='none';
}
render(10);
document.getElementById('loadMore').onclick=()=>render(10);
document.getElementById('search').oninput=e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('.post').forEach(p=>p.style.display=p.dataset.name.includes(q)?'block':'none')}
</script>
</body>
</html>
